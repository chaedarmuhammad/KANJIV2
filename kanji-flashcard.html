<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字カード — Kanji Flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0d;
    --surface: #1a1917;
    --surface2: #242220;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --text2: #9a9590;
    --text3: #5c5954;
    --accent: #e8c97a;
    --accent2: #c4a355;
    --green: #6dbf8a;
    --red: #e07070;
    --green-bg: rgba(109,191,138,0.12);
    --red-bg: rgba(224,112,112,0.12);
    --green-border: rgba(109,191,138,0.25);
    --red-border: rgba(224,112,112,0.25);
    --radius: 12px;
    --radius-lg: 18px;
    --font-jp: 'Noto Serif JP', serif;
    --font-sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .logo-kanji {
    font-family: var(--font-jp);
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
  }
  .logo-text {
    font-size: 13px;
    font-weight: 300;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-stats {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text3);
  }
  .header-stat span {
    color: var(--text2);
    font-weight: 500;
  }

  /* ── Screens ── */
  .screen { display: none; flex: 1; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── Select Screen ── */
  #screen-select {
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
    padding: 40px 32px;
    gap: 28px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
  }

  /* range inputs */
  .range-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .range-row label {
    font-size: 13px;
    color: var(--text2);
  }
  .num-input {
    width: 72px;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font-sans);
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .num-input:focus { border-color: var(--accent2); }

  /* ── Shared button base ── */
  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    font-size: 13px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 400;
  }
  .btn:hover { background: var(--surface2); border-color: var(--border2); }
  .btn-accent {
    background: var(--accent);
    color: #0f0e0d;
    border-color: var(--accent);
    font-weight: 500;
  }
  .btn-accent:hover { background: var(--accent2); border-color: var(--accent2); color: #0f0e0d; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* category chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 400;
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.on {
    background: var(--accent);
    color: #0f0e0d;
    border-color: var(--accent);
    font-weight: 500;
  }

  /* mode buttons */
  .mode-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .mode-btn {
    padding: 9px 20px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--border2); color: var(--text); }
  .mode-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(232,201,122,0.08); }

  .sel-footer {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    padding-top: 8px;
  }
  .sel-count {
    font-size: 13px;
    color: var(--text2);
    margin-left: auto;
  }
  .sel-count strong { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-kanji">漢字</span>
    <span class="logo-text">Flashcard</span>
  </div>
  <div class="header-stats">
    <div class="header-stat" aria-live="polite">Total: <span id="header-total">0</span> kanji</div>
  </div>
</header>

<!-- SELECT SCREEN -->
<div id="screen-select" class="screen active" role="region" aria-label="Pengaturan kuis">

  <div>
    <p class="section-title">Rentang nomor</p>
    <div class="panel">
      <div class="range-row">
        <label for="range-from">Dari nomor</label>
        <input type="number" class="num-input" id="range-from" min="1" value="1" aria-label="Nomor awal">
        <label for="range-to">sampai</label>
        <input type="number" class="num-input" id="range-to" min="1" value="100" aria-label="Nomor akhir">
        <button class="btn btn-accent" id="btn-apply-range" aria-label="Terapkan rentang">Terapkan</button>
      </div>
    </div>
  </div>

  <div>
    <p class="section-title">Pilih cepat per kelompok</p>
    <div class="panel">
      <div class="chips" id="cat-chips" role="group" aria-label="Kelompok kanji"></div>
    </div>
  </div>

  <div>
    <p class="section-title">Mode kuis</p>
    <div class="panel">
      <div class="mode-group" role="radiogroup" aria-label="Mode kuis">
        <button class="mode-btn on" id="mode-k2a" role="radio" aria-checked="true">Kanji → Arti</button>
        <button class="mode-btn" id="mode-a2k" role="radio" aria-checked="false">Arti → Kanji</button>
        <button class="mode-btn" id="mode-mix" role="radio" aria-checked="false">Campur</button>
      </div>
    </div>
  </div>

  <div>
    <p class="section-title">Mode acak</p>
    <div class="panel">
      <div class="shuffle-toggle">
        <label class="toggle-label" for="shuffle-toggle">Acak urutan kartu</label>
        <button class="toggle-btn" id="shuffle-toggle" role="switch" aria-checked="false" aria-label="Acak urutan kartu">
          <span class="toggle-knob"></span>
        </button>
      </div>
    </div>
  </div>

  <div class="sel-footer">
    <button class="btn btn-accent" id="btn-start-quiz" style="padding:11px 28px;font-size:14px" aria-label="Mulai kuis">Mulai kuis →</button>
    <button class="btn btn-sm" id="btn-select-all" aria-label="Pilih semua kanji">Pilih semua</button>
    <button class="btn btn-sm" id="btn-clear-all" aria-label="Hapus semua pilihan">Hapus semua</button>
    <span class="sel-count" id="sel-count" aria-live="polite">Dipilih: <strong>0</strong> kanji</span>
  </div>

</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen" role="region" aria-label="Kuis flashcard">


  <div class="quiz-header">
    <button class="btn btn-sm" id="btn-back-quiz" aria-label="Kembali ke pengaturan">← Kembali</button>
    <span class="quiz-counter" id="quiz-counter" aria-live="polite"><strong>1</strong> / 1</span>
    <button class="btn btn-sm" id="btn-shuffle-restart" style="display:none" aria-label="Acak ulang kartu">Acak ulang</button>
  </div>

  <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="nav-row">
    <button class="btn-nav" id="btn-prev" aria-label="Kartu sebelumnya">← Sebelumnya</button>
    <button class="btn-nav" id="btn-next" aria-label="Kartu sesudahnya">Sesudahnya →</button>
  </div>

  <div class="card-wrap">
    <div class="card" id="flashcard" role="button" tabindex="0" aria-label="Klik atau tekan spasi untuk melihat jawaban">
      <span class="card-badge" id="card-badge">Kanji → Arti</span>
      <span class="card-no" id="card-no">#1</span>
      <div class="card-main" id="card-main"></div>
      <div class="card-sub" id="card-sub"></div>
      <div class="card-answer" id="card-answer" aria-live="polite">
        <div class="card-divider"></div>
        <div id="answer-content"></div>
      </div>
      <span class="flip-hint" id="flip-hint">klik untuk lihat jawaban · spasi</span>
    </div>
  </div>

  <div class="rating-row" id="rating-row" aria-label="Penilaian">
    <button class="btn-rate btn-unknown" id="btn-rate-unknown" aria-label="Belum tahu">✕ Belum tahu</button>
    <button class="btn-rate btn-know" id="btn-rate-know" aria-label="Tahu">✓ Tahu</button>
  </div>

  <div class="keyboard-hints" aria-hidden="true">
    <span class="kh"><kbd class="kbd">Space</kbd> balik kartu</span>
    <span class="kh"><kbd class="kbd">←</kbd> sebelumnya</span>
    <span class="kh"><kbd class="kbd">→</kbd> sesudahnya</span>
    <span class="kh"><kbd class="kbd">1</kbd> belum tahu</span>
    <span class="kh"><kbd class="kbd">2</kbd> tahu</span>
  </div>

  <div class="stats-row">
    <div class="stat-card stat-know"><div class="stat-num" id="stat-know">0</div><div class="stat-label">Tahu</div></div>
    <div class="stat-card stat-unknown"><div class="stat-num" id="stat-unknown">0</div><div class="stat-label">Belum</div></div>
    <div class="stat-card stat-left"><div class="stat-num" id="stat-left">0</div><div class="stat-label">Tersisa</div></div>
  </div>

</div>

<!-- RESULT SCREEN -->
<div id="screen-result" class="screen" role="region" aria-label="Hasil kuis">
  <div class="result-icon" aria-hidden="true">完</div>
  <div>
    <h2 class="result-title">Sesi selesai!</h2>
    <p class="result-sub" id="result-sub" aria-live="polite"></p>
  </div>
  <div class="result-big-stats">
    <div class="res-stat res-green"><div class="res-num" id="res-know">0</div><div class="res-label">Tahu</div></div>
    <div class="res-stat res-red"><div class="res-num" id="res-unknown">0</div><div class="res-label">Belum tahu</div></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-accent" id="btn-retry-unknown" aria-label="Ulangi yang belum tahu">Ulangi yang belum tahu →</button>
    <button class="btn" id="btn-retry-all" aria-label="Ulangi semua kartu">Ulangi semua</button>
    <button class="btn" id="btn-back-result" aria-label="Pilih kanji lain">Pilih kanji lain</button>
  </div>
</div>


<style>
  /* ── Quiz Screen ── */
  #screen-quiz {
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
    padding: 32px 24px;
    gap: 0;
    align-items: stretch;
  }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .quiz-counter {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.06em;
  }
  .quiz-counter strong { color: var(--text2); font-weight: 500; }

  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 36px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* Flashcard */
  .card-wrap {
    perspective: 1000px;
    margin-bottom: 24px;
    flex: 1;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 48px 32px;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, transform 0.15s;
    user-select: none;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .card:active { transform: translateY(0); }
  .card:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

  .card-badge {
    position: absolute;
    top: 18px;
    left: 20px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 500;
  }
  .card-no {
    position: absolute;
    top: 18px;
    right: 20px;
    font-size: 11px;
    color: var(--text3);
  }

  .card-main {
    font-family: var(--font-jp);
    font-size: 72px;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }
  .card-main.latin { font-family: var(--font-sans); font-size: 28px; font-weight: 300; }
  .card-sub {
    font-size: 16px;
    color: var(--text2);
    font-weight: 300;
  }

  .card-divider {
    width: 40px;
    height: 1px;
    background: var(--border2);
    margin: 20px auto;
  }

  .card-answer { display: none; text-align: center; }
  .card-answer.visible { display: block; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .answer-main {
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 6px;
  }
  .answer-kana {
    font-size: 15px;
    color: var(--text2);
    font-weight: 300;
  }
  .answer-kanji {
    font-family: var(--font-jp);
    font-size: 40px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .flip-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  /* Rating */
  .rating-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
  }
  .rating-row.visible { opacity: 1; pointer-events: all; transform: none; }
  .btn-rate {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    font-size: 14px;
    font-family: var(--font-sans);
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-know {
    background: var(--green-bg);
    color: var(--green);
    border-color: var(--green-border);
  }
  .btn-know:hover { background: rgba(109,191,138,0.2); }
  .btn-unknown {
    background: var(--red-bg);
    color: var(--red);
    border-color: var(--red-border);
  }
  .btn-unknown:hover { background: rgba(224,112,112,0.2); }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 0;
  }
  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    text-align: center;
  }
  .stat-num {
    font-size: 24px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; }
  .stat-know .stat-num { color: var(--green); }
  .stat-unknown .stat-num { color: var(--red); }
  .stat-left .stat-num { color: var(--text2); }

  /* keyboard hint */
  .keyboard-hints {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 12px 0;
    flex-wrap: wrap;
  }
  .kh { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    color: var(--text2);
    min-width: 22px;
  }

  /* ── Result Screen ── */
  #screen-result {
    max-width: 560px;
    margin: 0 auto;
    width: 100%;
    padding: 60px 24px;
    align-items: center;
    justify-content: center;
    gap: 28px;
    text-align: center;
  }
  .result-icon {
    font-family: var(--font-jp);
    font-size: 56px;
    color: var(--accent);
  }
  .result-title {
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
  }
  .result-sub { font-size: 14px; color: var(--text2); font-weight: 300; }
  .result-big-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    width: 100%;
  }
  .res-stat {
    flex: 1;
    max-width: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 16px;
  }
  .res-num { font-size: 40px; font-weight: 500; line-height: 1; margin-bottom: 6px; }
  .res-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .res-green .res-num { color: var(--green); }
  .res-red .res-num { color: var(--red); }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  /* ── Shuffle Toggle ── */
  .shuffle-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .toggle-label {
    font-size: 14px;
    color: var(--text2);
  }
  .toggle-btn {
    position: relative;
    width: 48px;
    height: 26px;
    border-radius: 13px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.2s;
    padding: 0;
  }
  .toggle-btn.on {
    background: var(--accent);
    border-color: var(--accent);
  }
  .toggle-knob {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--text2);
    transition: all 0.2s;
  }
  .toggle-btn.on .toggle-knob {
    left: 25px;
    background: #0f0e0d;
  }

  /* ── Nav Row ── */
  .nav-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }
  .btn-nav {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-nav:hover { background: var(--surface2); color: var(--text); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-nav:disabled:hover { background: transparent; color: var(--text2); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* Responsive */
  @media (max-width: 500px) {
    header { padding: 14px 18px; }
    #screen-select { padding: 24px 16px; }
    #screen-quiz { padding: 24px 16px; }
    .card-main { font-size: 52px; }
    .header-stats { display: none; }
  }
</style>


<script src="kanji-data.js"></script>
<script>
(function() {
  'use strict';

  // ── Constants ──
  const TOTAL_KANJI = KANJI_DATA.length;
  const GROUP_SIZE = 50;
  const CATEGORIES = generateCategories(TOTAL_KANJI, GROUP_SIZE);

  // ── State ──
  let selectedIds = new Set();
  let quizMode = 'k2a'; // 'k2a' | 'a2k' | 'mix'
  let deck = [];
  let currentIndex = 0;
  let isFlipped = false;
  let knownCount = 0;
  let unknownCount = 0;
  let unknownCards = [];
  let isShuffleOn = false;
  let currentCardMode = 'k2a';

  // ── DOM Cache ──
  const dom = {
    headerTotal: document.getElementById('header-total'),
    rangeFrom: document.getElementById('range-from'),
    rangeTo: document.getElementById('range-to'),
    catChips: document.getElementById('cat-chips'),
    selCount: document.getElementById('sel-count'),
    quizCounter: document.getElementById('quiz-counter'),
    progressFill: document.getElementById('progress-fill'),
    progressTrack: document.getElementById('progress-track'),
    cardBadge: document.getElementById('card-badge'),
    cardNo: document.getElementById('card-no'),
    cardMain: document.getElementById('card-main'),
    cardSub: document.getElementById('card-sub'),
    cardAnswer: document.getElementById('card-answer'),
    answerContent: document.getElementById('answer-content'),
    flipHint: document.getElementById('flip-hint'),
    ratingRow: document.getElementById('rating-row'),
    statKnow: document.getElementById('stat-know'),
    statUnknown: document.getElementById('stat-unknown'),
    statLeft: document.getElementById('stat-left'),
    resKnow: document.getElementById('res-know'),
    resUnknown: document.getElementById('res-unknown'),
    resultSub: document.getElementById('result-sub'),
    btnPrev: document.getElementById('btn-prev'),
    btnNext: document.getElementById('btn-next'),
    btnShuffleRestart: document.getElementById('btn-shuffle-restart'),
    shuffleToggle: document.getElementById('shuffle-toggle'),
    flashcard: document.getElementById('flashcard'),
  };

  // ── Utility Functions ──
  function generateCategories(total, size) {
    const categories = [];
    for (let start = 1; start <= total; start += size) {
      const end = Math.min(start + size - 1, total);
      categories.push({ label: start + '–' + end, from: start, to: end });
    }
    return categories;
  }

  function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const randomIndex = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[i]];
    }
    return shuffled;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(function(screen) {
      screen.classList.remove('active');
    });
    document.getElementById('screen-' + screenId).classList.add('active');
  }

  // ── Selection Logic ──
  function applyRange() {
    var fromValue = parseInt(dom.rangeFrom.value) || 1;
    var toValue = parseInt(dom.rangeTo.value) || TOTAL_KANJI;

    // Validation: clamp values to valid range
    fromValue = clamp(fromValue, 1, TOTAL_KANJI);
    toValue = clamp(toValue, 1, TOTAL_KANJI);

    // Swap if from > to
    if (fromValue > toValue) {
      var temp = fromValue;
      fromValue = toValue;
      toValue = temp;
    }

    // Update input fields with validated values
    dom.rangeFrom.value = fromValue;
    dom.rangeTo.value = toValue;

    selectedIds.clear();
    KANJI_DATA.forEach(function(entry) {
      if (entry[0] >= fromValue && entry[0] <= toValue) {
        selectedIds.add(entry[0]);
      }
    });
    updateCategoryChips();
    updateSelectedCount();
  }

  function toggleCategory(category) {
    var entriesInCategory = KANJI_DATA.filter(function(entry) {
      return entry[0] >= category.from && entry[0] <= category.to;
    });
    var allSelected = entriesInCategory.every(function(entry) {
      return selectedIds.has(entry[0]);
    });

    entriesInCategory.forEach(function(entry) {
      if (allSelected) {
        selectedIds.delete(entry[0]);
      } else {
        selectedIds.add(entry[0]);
      }
    });
    updateCategoryChips();
    updateSelectedCount();
  }


  function updateCategoryChips() {
    var chips = dom.catChips.querySelectorAll('.chip');
    CATEGORIES.forEach(function(category, index) {
      var allSelected = KANJI_DATA
        .filter(function(entry) { return entry[0] >= category.from && entry[0] <= category.to; })
        .every(function(entry) { return selectedIds.has(entry[0]); });
      chips[index].classList.toggle('on', allSelected);
      chips[index].setAttribute('aria-pressed', allSelected);
    });
  }

  function selectAll() {
    KANJI_DATA.forEach(function(entry) { selectedIds.add(entry[0]); });
    updateCategoryChips();
    updateSelectedCount();
  }

  function clearAll() {
    selectedIds.clear();
    updateCategoryChips();
    updateSelectedCount();
  }

  function updateSelectedCount() {
    dom.selCount.innerHTML = 'Dipilih: <strong>' + selectedIds.size + '</strong> kanji';
  }

  // ── Mode & Shuffle ──
  function setQuizMode(newMode) {
    quizMode = newMode;
    ['k2a', 'a2k', 'mix'].forEach(function(modeId) {
      var btn = document.getElementById('mode-' + modeId);
      var isActive = modeId === newMode;
      btn.classList.toggle('on', isActive);
      btn.setAttribute('aria-checked', isActive);
    });
  }

  function toggleShuffle() {
    isShuffleOn = !isShuffleOn;
    dom.shuffleToggle.classList.toggle('on', isShuffleOn);
    dom.shuffleToggle.setAttribute('aria-checked', isShuffleOn);
    dom.btnShuffleRestart.style.display = isShuffleOn ? 'inline-block' : 'none';
  }

  // ── Quiz Logic ──
  function startQuiz() {
    if (selectedIds.size === 0) {
      alert('Pilih minimal 1 kanji!');
      return;
    }
    deck = KANJI_DATA.filter(function(entry) { return selectedIds.has(entry[0]); });
    if (isShuffleOn) {
      deck = shuffleArray(deck);
    }
    currentIndex = 0;
    knownCount = 0;
    unknownCount = 0;
    unknownCards = [];
    showScreen('quiz');
    renderCard();
  }

  function shuffleAndRestart() {
    deck = shuffleArray(deck);
    currentIndex = 0;
    knownCount = 0;
    unknownCount = 0;
    unknownCards = [];
    renderCard();
  }

  function previousCard() {
    if (currentIndex <= 0) return;
    currentIndex--;
    renderCard();
  }

  function nextCard() {
    if (currentIndex >= deck.length - 1) return;
    currentIndex++;
    renderCard();
  }

  function updateNavigationButtons() {
    dom.btnPrev.disabled = (currentIndex <= 0);
    dom.btnNext.disabled = (currentIndex >= deck.length - 1);
  }

  function renderCard() {
    isFlipped = false;
    var currentEntry = deck[currentIndex];
    currentCardMode = quizMode === 'mix' ? (currentIndex % 2 === 0 ? 'k2a' : 'a2k') : quizMode;

    dom.cardBadge.textContent = currentCardMode === 'k2a' ? 'Kanji → Arti' : 'Arti → Kanji';
    dom.cardNo.textContent = '#' + currentEntry[0];

    if (currentCardMode === 'k2a') {
      dom.cardMain.textContent = currentEntry[1];
      dom.cardMain.className = 'card-main';
      dom.cardSub.textContent = '';
    } else {
      dom.cardMain.textContent = currentEntry[3];
      dom.cardMain.className = 'card-main latin';
      dom.cardSub.textContent = currentEntry[2];
    }

    dom.cardAnswer.className = 'card-answer';
    dom.flipHint.style.display = 'block';
    dom.ratingRow.classList.remove('visible');
    updateProgress();
    updateNavigationButtons();
  }

  function flipCard() {
    if (isFlipped) return;
    isFlipped = true;
    var currentEntry = deck[currentIndex];

    if (currentCardMode === 'k2a') {
      dom.answerContent.innerHTML =
        '<div class="answer-main">' + currentEntry[3] + '</div>' +
        '<div class="answer-kana">' + currentEntry[2] + '</div>';
    } else {
      dom.answerContent.innerHTML =
        '<div class="answer-kanji">' + currentEntry[1] + '</div>' +
        '<div class="answer-kana">' + currentEntry[2] + '</div>';
    }

    dom.cardAnswer.className = 'card-answer visible';
    dom.flipHint.style.display = 'none';
    dom.ratingRow.classList.add('visible');
  }

  function rateCard(isKnown) {
    if (isKnown) {
      knownCount++;
    } else {
      unknownCount++;
      unknownCards.push(deck[currentIndex]);
    }
    dom.statKnow.textContent = knownCount;
    dom.statUnknown.textContent = unknownCount;
    currentIndex++;
    if (currentIndex >= deck.length) {
      showResult();
    } else {
      renderCard();
    }
  }

  function updateProgress() {
    var percentage = Math.round((currentIndex / deck.length) * 100);
    dom.progressFill.style.width = percentage + '%';
    dom.progressTrack.setAttribute('aria-valuenow', percentage);
    dom.quizCounter.innerHTML = '<strong>' + (currentIndex + 1) + '</strong> / ' + deck.length;
    dom.statLeft.textContent = deck.length - currentIndex;
  }

  function showResult() {
    dom.resKnow.textContent = knownCount;
    dom.resUnknown.textContent = unknownCount;
    var percentage = Math.round((knownCount / deck.length) * 100);
    dom.resultSub.textContent = 'Kamu tahu ' + knownCount + ' dari ' + deck.length + ' kanji (' + percentage + '%)';
    showScreen('result');
  }

  function retryUnknown() {
    if (unknownCards.length === 0) {
      alert('Semua sudah tahu!');
      return;
    }
    deck = isShuffleOn ? shuffleArray(unknownCards) : [...unknownCards];
    currentIndex = 0;
    knownCount = 0;
    unknownCount = 0;
    unknownCards = [];
    showScreen('quiz');
    renderCard();
  }

  function retryAll() {
    deck = isShuffleOn ? shuffleArray(deck) : [...deck];
    currentIndex = 0;
    knownCount = 0;
    unknownCount = 0;
    unknownCards = [];
    showScreen('quiz');
    renderCard();
  }

  function backToSelect() {
    showScreen('select');
  }


  // ── Keyboard Handler ──
  function handleKeyDown(event) {
    var quizScreen = document.getElementById('screen-quiz');
    if (!quizScreen.classList.contains('active')) return;
    if (event.target.tagName === 'INPUT') return;

    switch (event.code) {
      case 'Space':
        event.preventDefault();
        flipCard();
        break;
      case 'ArrowLeft':
        event.preventDefault();
        previousCard();
        break;
      case 'ArrowRight':
        event.preventDefault();
        nextCard();
        break;
    }

    if (isFlipped) {
      if (event.key === '1') rateCard(false);
      if (event.key === '2') rateCard(true);
    }
  }

  // ── Initialization ──
  function initialize() {
    // Set dynamic max values based on actual data
    dom.rangeFrom.max = TOTAL_KANJI;
    dom.rangeTo.max = TOTAL_KANJI;
    dom.headerTotal.textContent = TOTAL_KANJI;

    // Generate category chips
    CATEGORIES.forEach(function(category) {
      var chipButton = document.createElement('button');
      chipButton.className = 'chip';
      chipButton.textContent = category.label;
      chipButton.setAttribute('role', 'button');
      chipButton.setAttribute('aria-pressed', 'false');
      chipButton.setAttribute('aria-label', 'Kelompok kanji ' + category.label);
      chipButton.addEventListener('click', function() {
        toggleCategory(category);
      });
      dom.catChips.appendChild(chipButton);
    });

    // Apply initial range
    applyRange();

    // ── Event Listeners ──

    // Select screen
    document.getElementById('btn-apply-range').addEventListener('click', applyRange);
    document.getElementById('btn-select-all').addEventListener('click', selectAll);
    document.getElementById('btn-clear-all').addEventListener('click', clearAll);
    document.getElementById('btn-start-quiz').addEventListener('click', startQuiz);
    dom.shuffleToggle.addEventListener('click', toggleShuffle);

    // Mode buttons
    document.getElementById('mode-k2a').addEventListener('click', function() { setQuizMode('k2a'); });
    document.getElementById('mode-a2k').addEventListener('click', function() { setQuizMode('a2k'); });
    document.getElementById('mode-mix').addEventListener('click', function() { setQuizMode('mix'); });

    // Quiz screen
    document.getElementById('btn-back-quiz').addEventListener('click', backToSelect);
    dom.btnShuffleRestart.addEventListener('click', shuffleAndRestart);
    dom.btnPrev.addEventListener('click', previousCard);
    dom.btnNext.addEventListener('click', nextCard);
    dom.flashcard.addEventListener('click', flipCard);
    document.getElementById('btn-rate-unknown').addEventListener('click', function() { rateCard(false); });
    document.getElementById('btn-rate-know').addEventListener('click', function() { rateCard(true); });

    // Result screen
    document.getElementById('btn-retry-unknown').addEventListener('click', retryUnknown);
    document.getElementById('btn-retry-all').addEventListener('click', retryAll);
    document.getElementById('btn-back-result').addEventListener('click', backToSelect);

    // Keyboard
    document.addEventListener('keydown', handleKeyDown);
  }

  // Start the app
  initialize();

})();
</script>
</body>
</html>
